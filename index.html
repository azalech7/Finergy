var AppContext=createContext(null);

function appReducer(state,action){
  switch(action.type){
    case 'SET_EXPENSE':{var a=state.expenses[action.category].slice();a[action.monthIdx]=action.value;return Object.assign({},state,{expenses:Object.assign({},state.expenses,(function(){var tmp={};tmp[action.category]=a;return tmp;})())});}
    case 'SET_INCOME':{var b=state.income[action.category].slice();b[action.monthIdx]=action.value;return Object.assign({},state,{income:Object.assign({},state.income,(function(){var tmp={};tmp[action.category]=b;return tmp;})())});}
    case 'ADD_EXPENSE_CATEGORY':if(state.settings.expenseCategories.indexOf(action.name)>=0)return state;return Object.assign({},state,{expenses:Object.assign({},state.expenses,(function(){var tmp={};tmp[action.name]=Array(WINDOW_SIZE).fill(0);return tmp;})()),settings:Object.assign({},state.settings,{expenseCategories:state.settings.expenseCategories.concat([action.name])})});
    case 'REMOVE_EXPENSE_CATEGORY':{var ec=Object.assign({},state.expenses);delete ec[action.name];return Object.assign({},state,{expenses:ec,settings:Object.assign({},state.settings,{expenseCategories:state.settings.expenseCategories.filter(function(c){return c!==action.name;})})});}
    case 'RENAME_EXPENSE_CATEGORY':{var rec=Object.assign({},state.expenses);rec[action.newName]=rec[action.oldName]||Array(WINDOW_SIZE).fill(0);delete rec[action.oldName];return Object.assign({},state,{expenses:rec,settings:Object.assign({},state.settings,{expenseCategories:state.settings.expenseCategories.map(function(c){return c===action.oldName?action.newName:c;})})});}
    case 'ADD_INCOME_CATEGORY':if(state.settings.incomeCategories.indexOf(action.name)>=0)return state;return Object.assign({},state,{income:Object.assign({},state.income,(function(){var tmp={};tmp[action.name]=Array(WINDOW_SIZE).fill(0);return tmp;})()),settings:Object.assign({},state.settings,{incomeCategories:state.settings.incomeCategories.concat([action.name])})});
    case 'REMOVE_INCOME_CATEGORY':{var ic=Object.assign({},state.income);delete ic[action.name];return Object.assign({},state,{income:ic,settings:Object.assign({},state.settings,{incomeCategories:state.settings.incomeCategories.filter(function(c){return c!==action.name;})})});}
    case 'RENAME_INCOME_CATEGORY':{var ric=Object.assign({},state.income);ric[action.newName]=ric[action.oldName]||Array(WINDOW_SIZE).fill(0);delete ric[action.oldName];return Object.assign({},state,{income:ric,settings:Object.assign({},state.settings,{incomeCategories:state.settings.incomeCategories.map(function(c){return c===action.oldName?action.newName:c;})})});}
    case 'UPDATE_ACCOUNT':{
      var exists=state.accounts.some(function(a){return a.id===action.account.id;});
      if(exists)return Object.assign({},state,{accounts:state.accounts.map(function(a){return a.id===action.account.id?action.account:a;})});
      return Object.assign({},state,{accounts:state.accounts.concat([action.account])});

    case 'ADD_MOVEMENT':return Object.assign({},state,{movements:[action.movement].concat(state.movements)});
    case 'DELETE_MOVEMENT':return Object.assign({},state,{movements:state.movements.filter(function(m){return m.id!==action.id;})});
    case 'UPDATE_SETTINGS':return Object.assign({},state,{settings:Object.assign({},state.settings,action.settings)});
    case 'ADD_SHARED_CATEGORY':if(state.settings.sharedCategories.indexOf(action.name)>=0)return state;return Object.assign({},state,{settings:Object.assign({},state.settings,{sharedCategories:state.settings.sharedCategories.concat([action.name])})});
    case 'REMOVE_SHARED_CATEGORY':return Object.assign({},state,{settings:Object.assign({},state.settings,{sharedCategories:state.settings.sharedCategories.filter(function(c){return c!==action.name;})})});
    case 'ADD_SHARED_EXPENSE':return Object.assign({},state,{sharedExpenses:[action.expense].concat(state.sharedExpenses)});
    case 'SET_SHARED_DATA':return Object.assign({},state,{sharedExpenses:action.sharedExpenses,reimbursements:action.reimbursements});
    case 'SETTLE_SHARED_EXPENSE':return Object.assign({},state,{sharedExpenses:state.sharedExpenses.map(function(e){return e.id===action.id?Object.assign({},e,{settled:true}):e;})});
    case 'DELETE_SHARED_EXPENSE':return Object.assign({},state,{sharedExpenses:state.sharedExpenses.filter(function(e){return e.id!==action.id;})});
    case 'ADD_REIMBURSEMENT':return Object.assign({},state,{reimbursements:[action.reimbursement].concat(state.reimbursements)});
    case 'SETTLE_MONTH':return Object.assign({},state,{sharedExpenses:state.sharedExpenses.map(function(e){return e.month===action.month?Object.assign({},e,{settled:true}):e;}),reimbursements:state.reimbursements.map(function(r){return r.month===action.month?Object.assign({},r,{settled:true}):r;})});

var fmt=function(v){return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);};
var fmt2=function(v){return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(v);};

function mkId(){return 'c'+Math.random().toString(36).slice(2,8);}
function bezier(pts){
  if(!pts||pts.length<2)return '';
  var d='M'+pts[0].x+','+pts[0].y;
  for(var i=1;i<pts.length;i++){var p=pts[i-1],c=pts[i],dx=(c.x-p.x)*0.42;d+=' C'+(p.x+dx)+','+p.y+' '+(c.x-dx)+','+c.y+' '+c.x+','+c.y;}
  return d;
}
function useWidth(ref,fallback){
  var fb=fallback||320;var ws=useState(fb);var w=ws[0];var setW=ws[1];
  useLayoutEffect(function(){
    if(!ref.current)return;var el=ref.current;
    function update(){setW(el.clientWidth||fb);}update();
    var ro=new ResizeObserver(update);ro.observe(el);return function(){ro.disconnect();};
  },[]);
  return w;
}

// ─── MONTH COMPLETENESS RULE ──────────────────────────────────────────────────
// A month is complete only if it has income in 'Nómina' category.
// Incomplete months are excluded from all charts and aggregates.
function isMonthComplete(mi, income){
  var nomina=income&&(income['Nómina']||income['Nomina']||income['nómina']||income['nomina']);
  return nomina?(nomina[mi]||0)>0:false;
}
// Filter idxs to only complete months
function completeIdxs(idxs, income){
  return idxs.filter(function(mi){return isMonthComplete(mi,income);});
}

// helper: get slice indices for period
function getChartLabels(idxs){
  // When many months, use MM/YY format to avoid crowding
  if(idxs.length>12){
    return idxs.map(function(mi){
      var key=DB_MONTHS[mi]||'';
      return key?key.slice(5)+'/'+key.slice(2,4):'';
    });
  }
  return idxs.map(function(mi){return MONTHS_SHORT[mi]||'';});
}

function getPeriodSlice(period){
  var last=WINDOW_SIZE-1;
  if(period==='1m') return {start:last,end:WINDOW_SIZE,len:1,period:period};
  if(period==='3m') return {start:last-2,end:WINDOW_SIZE,len:3,period:period};
  if(period==='6m') return {start:last-5,end:WINDOW_SIZE,len:6,period:period};
  if(period==='12m') return {start:last-11,end:WINDOW_SIZE,len:12,period:period};
  if(period==='max') return {start:0,end:WINDOW_SIZE,len:WINDOW_SIZE,period:period};
  if(period==='year'){
    var curY=new Date().getFullYear();
    var startI=DB_MONTHS.findIndex(function(m){return m.startsWith(String(curY));});
    if(startI<0)startI=0;
    var len2=WINDOW_SIZE-startI;
    return {start:startI,end:WINDOW_SIZE,len:len2,period:period};
  }
  return {start:0,end:WINDOW_SIZE,len:WINDOW_SIZE,period:period};
}

function Tooltip(props){
  var x=props.x,y=props.y,w=props.w,visible=props.visible,lines=props.lines||[];
  if(!visible||!lines.length) return null;
  var TW=120, TH=14+lines.length*18, PAD=8;
  var tx=Math.min(Math.max(x-TW/2, PAD), w-TW-PAD);
  var ty=y-TH-10; if(ty<4){ty=y+14;}
  return h('g',null,
    h('rect',{x:tx,y:ty,width:TW,height:TH,rx:7,fill:'rgba(10,18,36,0.96)',stroke:'rgba(255,255,255,0.12)',strokeWidth:'1'}),
    lines.map(function(l,i){

// ─── STACKED LINES CHART ─────────────────────────────────────────────────────
function StackedLinesChart(props){
  var trends=props.trends,idxs=props.idxs,analysisType=props.analysisType;
  var ref=useRef(null);var w=useWidth(ref,320);var id=useMemo(mkId,[]);
  var ts=useState(null);var tip=ts[0];var setTip=ts[1];
  var height=220;
  var PL=46,PR=10,PT=10,PB=26;
  var cw=w-PL-PR,ch=height-PT-PB,n=idxs.length;
  if(!trends.length||!n)return h('div',{ref:ref,style:{height:height}});

  // Sort bottom to top: largest at bottom
  var sorted=trends.slice(0,8).sort(function(a,b){return b.total-a.total;});
  // Cumulative stacks
  var stacks=idxs.map(function(){return 0;});
  var stackedSeries=sorted.map(function(t){
    var base=stacks.slice();
    idxs.forEach(function(_,i){stacks[i]+=t.vals[i]||0;});
    return{cat:t.cat,vals:t.vals,base:base,top:stacks.slice()};
  }).reverse(); // smallest on top

  var maxVal=Math.max.apply(null,stacks)||1;
  var sx=function(i){return PL+(n>1?i/(n-1):0.5)*cw;};
  var sy=function(v){return PT+ch-(v/maxVal)*ch;};
  var step=Math.max(1,Math.ceil(n/5));

  function onMove(e){if(!ref.current)return;var rect=ref.current.getBoundingClientRect();var cx=e.touches?e.touches[0].clientX:e.clientX;var i=Math.max(0,Math.min(n-1,Math.round((cx-rect.left-PL)/cw*(n-1))));setTip({i:i});}
  function onLeave(){setTip(null);}
  var ti=tip?tip.i:-1;

  var yTicks=[0,0.25,0.5,0.75,1].map(function(t){var v=t*maxVal;return{y:sy(v),label:v>=1000?Math.round(v/1000)+'k':Math.round(v/100)*100+'€'};});

  return h('div',{ref:ref,style:{width:'100%'},onMouseMove:onMove,onMouseLeave:onLeave,onTouchMove:onMove,onTouchEnd:onLeave},
    h('svg',{width:w,height:height,style:{display:'block',overflow:'visible'}},
      h('defs',null,
        stackedSeries.map(function(s,i){
          var col=CAT_COLORS[sorted.length-1-i]||'#888';
          return h('linearGradient',{key:i,id:'sg'+i+id,x1:'0',y1:'0',x2:'0',y2:'1'},
            h('stop',{offset:'0%',stopColor:col,stopOpacity:'0.5'}),
            h('stop',{offset:'100%',stopColor:col,stopOpacity:'0.08'})
          );
        })
      ),
      yTicks.map(function(t,i){return h('g',{key:i},
        h('line',{x1:PL,y1:t.y,x2:w-PR,y2:t.y,stroke:'rgba(255,255,255,0.05)',strokeWidth:'1'}),
        h('text',{x:PL-5,y:t.y+4,textAnchor:'end',fill:'rgba(238,242,255,0.28)',fontSize:'9',fontFamily:'Plus Jakarta Sans'},t.label)
      );}),
      // Draw areas bottom to top
      stackedSeries.map(function(s,i){
        var col=CAT_COLORS[sorted.length-1-i]||'#888';
        var topPts=idxs.map(function(_,j){return{x:sx(j),y:sy(s.top[j]||0)};});
        var basePts=idxs.map(function(_,j){return{x:sx(j),y:sy(s.base[j]||0)};});
        var topLine=bezier(topPts);
        var areaPath=topLine+' L'+basePts.slice().reverse().map(function(p){return p.x+','+p.y;}).join(' L')+' Z';
        return h('g',{key:i},
          h('path',{d:areaPath,fill:'url(#sg'+i+id+')',opacity:0.9}),
          h('path',{d:topLine,fill:'none',stroke:col,strokeWidth:'1.5',strokeLinecap:'round',strokeLinejoin:'round'})
        );
      }),
      // x labels
      idxs.map(function(mi,i){if(i%step!==0&&i!==n-1)return null;return h('text',{key:i,x:sx(i),y:height-5,textAnchor:'middle',fill:'rgba(238,242,255,0.3)',fontSize:'9',fontFamily:'Plus Jakarta Sans'},MONTHS_SHORT[mi]||'');}),
      // Tooltip
      ti>=0?h('g',null,
        h('line',{x1:sx(ti),y1:PT,x2:sx(ti),y2:PT+ch,stroke:'rgba(255,255,255,0.15)',strokeWidth:'1',strokeDasharray:'3,3'}),
        h(Tooltip,{x:sx(ti),y:PT+20,w:w,visible:true,lines:
          stackedSeries.slice().reverse().map(function(s,i){
            var col=CAT_COLORS[i]||'#888';
            var v=s.vals[ti]||0;
            return v>0?{text:s.cat+': '+fmt(v),color:col,bold:false}:null;
          }).filter(Boolean)
        })
      ):null
    ),
    // Legend
    h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginTop:8,paddingLeft:PL}},
      sorted.map(function(s,i){return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:3}},
        h('div',{style:{width:8,height:8,borderRadius:2,background:CAT_COLORS[i]||'#888'}}),
        h('span',{style:{fontSize:9,color:'rgba(238,242,255,0.5)'}},s.cat)
      );})
    )
  );
}

// ─── COHERENCE CHART ─────────────────────────────────────────────────────────
function CoherenceChart(props){

  var maxAbs=Math.max.apply(null,allVals.map(function(v){return Math.abs(v);}));
  maxAbs=Math.max(maxAbs,1)*1.15;
  var zero=PT+ch/2;
  var sy=function(v){return zero-(v/maxAbs)*(ch/2);};
  var bw=Math.max(4,Math.min(16,cw/n*0.5));
  var sx=function(i){return PL+(n>1?i/(n-1):0.5)*cw;};
  var barX=function(i){return PL+i*(cw/n)+cw/n/2-bw/2;};
  var step=Math.max(1,Math.ceil(n/6));
  var fmtV=function(v){return(v>=0?'+':'')+Math.round(v/1000*10)/10+'k';};
  var yTicks=[-1,-0.5,0,0.5,1].map(function(t){var v=t*maxAbs;return{y:zero-t*(ch/2),label:Math.round(v/1000)+'k',zero:t===0};});
  var lineT=teorico.length>1?bezier(teorico.map(function(v,i){return{x:sx(i),y:sy(v)};})):null;
  var lineR=real.length>1?bezier(real.map(function(v,i){return{x:sx(i),y:sy(v)};})):null;
  function onMove(e){if(!ref.current)return;var rect=ref.current.getBoundingClientRect();var cx=e.touches?e.touches[0].clientX:e.clientX;var i=Math.max(0,Math.min(n-1,Math.round((cx-rect.left-PL)/(cw/Math.max(n-1,1)))));setTip({i:i});}
  function onLeave(){setTip(null);}
  var ti=tip?tip.i:-1;
  return h('div',{ref:ref,style:{width:'100%'},onMouseMove:onMove,onMouseLeave:onLeave,onTouchMove:onMove,onTouchEnd:onLeave},
    h('svg',{width:w,height:height,style:{display:'block',overflow:'visible',cursor:'crosshair'}},
      yTicks.map(function(t,i){return h('g',{key:i},
        h('line',{x1:PL,y1:t.y,x2:w-PR,y2:t.y,stroke:t.zero?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.05)',strokeWidth:t.zero?1.5:1}),
        h('text',{x:PL-5,y:t.y+4,textAnchor:'end',fill:'rgba(238,242,255,0.25)',fontSize:'9',fontFamily:'Plus Jakarta Sans'},t.label)
      );}),
      teorico.map(function(t,i){
        var r=real[i]||0;var dev=r-t;
        var yTop=sy(Math.max(t,r));var yBot=sy(Math.min(t,r));var hh=Math.max(1,yBot-yTop);
        var col=dev>=0?'rgba(61,214,140,0.5)':'rgba(255,107,107,0.5)';

    if(_hasData){lastSurplus=surplusTrend[_si];break;}

function InvestmentTab(){
  var ctx=useApp();var state=ctx.state;var dispatch=ctx.dispatch;
  var accounts=state.accounts;

  var er=useState(false);var editRate=er[0];var setEditRate=er[1];
  var ri=useState('');var rateInput=ri[0];var setRateInput=ri[1];
  var pm=useState(24);var projMonths=pm[0];var setProjMonths=pm[1];
  var pc=useState(500);var projContrib=pc[0];var setProjContrib=pc[1];
  // New contribution form
  var nc=useState(false);var showNewContrib=nc[0];var setShowNewContrib=nc[1];
  var sc=useState(false);var showContribs=sc[0];var setShowContribs=sc[1];
  var spi=useState(false);var showProjInv=spi[0];var setShowProjInv=spi[1];
  var cd=useState(new Date().toISOString().slice(0,10));var contribDate=cd[0];var setContribDate=cd[1];
  var ca=useState('');var contribAmt=ca[0];var setContribAmt=ca[1];

  var totalSavings=accounts.reduce(function(s,a){return s+a.balance;},0);
  var isGroupedRem=selId==='__all_rem__';
  var isGroupedFondos=selId==='__all_fondos__';
  var isGrouped=isGroupedRem||isGroupedFondos;
  var acc=isGrouped?null:invAccounts.find(function(a){return a.id===selId;});
  var isFondos=isGroupedFondos||(acc&&acc.type==='fondos');
  var isRem=isGroupedRem||(acc&&acc.type==='remunerada');
  var hasContribs=(isFondos||isRem)&&!isGrouped;
  // For grouped: aggregate balances and histories
  var groupAccs=isGroupedRem?invAccounts.filter(function(a){return a.type==='remunerada';}):
                isGroupedFondos?invAccounts.filter(function(a){return a.type==='fondos';}):
                acc?[acc]:[];
  var groupBalance=groupAccs.reduce(function(s,a){return s+(a.balance||0);},0);
  var groupHistory=Array(WINDOW_SIZE).fill(0).map(function(_,i){return groupAccs.reduce(function(s,a){return s+((a.history||[])[i]||0);},0);});
  var displayBalance=isGrouped?groupBalance:(acc?acc.balance:0);
  var displayHistory=isGrouped?groupHistory:(acc?acc.history:Array(WINDOW_SIZE).fill(0));
  var displayInterestRate=isGrouped?0:(acc?acc.interestRate:0);

  // Contributions for selected account
  var accContribs=contributions.filter(function(c){return String(c.account_id)===String(selId);}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var totalContributed=accContribs.reduce(function(s,c){return s+parseFloat(c.amount);},0);
  var contribLabel=isFondos?'Aportaciones':'Cobros de intereses';
  var contribAddLabel=isFondos?'Aportación':'Cobro';
  var contribAmtLabel=isFondos?'Importe (€)':'Intereses cobrados (€)';
  var rentabilidad=isFondos&&totalContributed>0&&acc?((acc.balance-totalContributed)/totalContributed*100):null;

  // Projection: fondos use rentabilidad, others use TAE
  var projRate=isFondos?(rentabilidad!==null?rentabilidad/100/12:0):(acc?(acc.interestRate/100/12):0);
  var projData=useMemo(function(){
    if((!acc&&!isGrouped)||!showProjInv)return[];
    var arr=[displayBalance],r=projRate;
    for(var i=1;i<=projMonths;i++)arr.push(arr[arr.length-1]*(1+r)+projContrib);
    return arr;
  },[acc,projMonths,projContrib,projRate,showProjInv]);

  function saveRate(){var nr=parseFloat(rateInput);if(!isNaN(nr)&&nr>0&&acc)dispatch({type:'UPDATE_ACCOUNT',account:Object.assign({},acc,{interestRate:nr,rateHistory:(acc.rateHistory||[]).concat([{date:new Date().toISOString().slice(0,10),rate:nr}])})});setEditRate(false);}

  function addContribution(){
    var amt=parseFloat(contribAmt);if(isNaN(amt)||!amt||!acc)return;
    var accIdNum=parseInt(selId)||selId;
    sb.from('fund_contributions').insert([{account_id:accIdNum,date:contribDate,amount:amt}]).select()
      .then(function(r){
        if(r.error){logErr('contrib insert error: '+r.error.message);return;}
        var row=r.data&&r.data[0];
        if(row){dispatch({type:'ADD_CONTRIBUTION',contribution:row});logOk('Aportación guardada: '+amt+'€');}
      });
    setContribAmt('');setShowNewContrib(false);
  }

  function deleteContribution(id){
    sb.from('fund_contributions').delete().eq('id',id).then(function(r){
      if(r.error)logErr('contrib delete error: '+r.error.message);

          h('div',{style:{fontSize:13,fontWeight:700,color:'#EEF2FF'}},fmt(Math.round(totalContributed)))

// ─── QUICK ENTRY (mes actual) ─────────────────────────────────────────────────
// QuickEntry — selector de mes + inputs controlados por mes
// La estrategia: QuickEntryMonth es un componente puro que recibe MI y se remonta
// con key={MI} cuando cambia el mes, inicializando estado limpio desde tableData.
function QuickEntryMonth(props){
  var type=props.type,MI=props.MI,categories=props.categories,tableData=props.tableData;
  var ctx=useApp();var dispatch=ctx.dispatch;
  var isG=type==='gastos';
  var actionType=isG?'SET_EXPENSE':'SET_INCOME';

  // Estado local de los inputs, inicializado desde tableData al montar (key fuerza remount)
  var iv=useState(function(){
    var init={};
    categories.forEach(function(cat){var v=(tableData[cat]||[])[MI]||0;init[cat]=v!==0?String(v):'';});
    return init;
  });
  var inputValues=iv[0];var setInputValues=iv[1];

  function handleKey(e,cat,idx){
    if(e.key==='Enter'||e.key==='ArrowDown'){
      e.preventDefault();
      var next=categories[idx+1];
      if(next){var el=document.querySelector('[data-qe="'+next+'-'+MI+'"]');if(el)el.focus();}
    }
    if(e.key==='ArrowUp'){
      e.preventDefault();
      var prev=categories[idx-1];
      if(prev){var el=document.querySelector('[data-qe="'+prev+'-'+MI+'"]');if(el)el.focus();}
    }
  }

  var total=categories.reduce(function(s,cat){return s+((tableData[cat]||[])[MI]||0);},0);

  return h('div',null,
    categories.map(function(cat,idx){
      var displayVal=inputValues[cat]!==undefined?inputValues[cat]:'';
      return h('div',{key:cat,style:{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}},
        h('div',{style:{width:8,height:8,borderRadius:'50%',background:CAT_COLORS[idx%CAT_COLORS.length],flexShrink:0}}),
        h('span',{style:{flex:1,fontSize:13,color:'rgba(238,242,255,0.8)',fontWeight:500}},cat),
        h('div',{style:{display:'flex',alignItems:'center',background:'rgba(255,255,255,0.05)',borderRadius:8,padding:'5px 10px',border:'1px solid rgba(255,255,255,0.08)',minWidth:100}},
          h('span',{style:{fontSize:12,color:'rgba(238,242,255,0.35)',marginRight:4}},'€'),
          h('input',{
            'data-qe':cat+'-'+MI,
            type:'number',
            value:displayVal,
            placeholder:'0',
            onChange:function(e){
              var s=e.target.value;
              setInputValues(function(prev){var u=Object.assign({},prev);u[cat]=s;return u;});
            },
            onBlur:function(e){
              var v=parseFloat(e.target.value)||0;
              dispatch({type:actionType,category:cat,monthIdx:MI,value:v});
              saveMonthlyData(DB_MONTHS[MI],cat,isG?'expense':'income',v);
            },
            onKeyDown:function(e){handleKey(e,cat,idx);},
            style:{background:'none',border:'none',color:'#EEF2FF',fontSize:13,fontWeight:600,width:80,outline:'none',textAlign:'right'}
          })
        )
      );
    })
  );
}

function QuickEntry(props){
  var type=props.type; // 'gastos' | 'ingresos'
  var ctx=useApp();var state=ctx.state;
  var isG=type==='gastos';
  var tableData=isG?state.expenses:state.income;

  var ms=useState(globalIdx);var selMonthIdx=ms[0];var setSelMonthIdx=ms[1];
  var MI=selMonthIdx;
  var _rawCats=isG?state.settings.expenseCategories:state.settings.incomeCategories;
  var categories=_rawCats.slice().sort(function(a,b){
    var vA=(tableData[a]||[])[MI]||0;
    var vB=(tableData[b]||[])[MI]||0;
    if(vB!==vA)return vB-vA;
    return a.localeCompare(b,'es');

  var total=categories.reduce(function(s,cat){return s+((tableData[cat]||[])[MI]||0);},0);

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},

        h('button',{onClick:function(){setSelMonthIdx(function(m){return Math.max(0,m-1);});},style:{background:'none',border:'none',color:'rgba(238,242,255,0.45)',fontSize:16,cursor:'pointer',padding:'0 4px'}},'‹'),
        h('div',{style:{fontSize:12,color:'rgba(238,242,255,0.7)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',minWidth:70,textAlign:'center'}},MONTHS_SHORT[selMonthIdx]+' '+DB_MONTHS[selMonthIdx].slice(0,4)),

}

// ─── ACCOUNT BALANCE EDITOR ──────────────────────────────────────────────────
function AccountBalanceEditor(props){
  var acc=props.acc,dispatch=props.dispatch;
  var es=useState(false);var editing=es[0];var setEditing=es[1];
  var ms2=useState(11);var editMonthIdx=ms2[0];var setEditMonthIdx=ms2[1];
  var vs=useState('');var val=vs[0];var setVal=vs[1];
  var er=useState(false);var editRate=er[0];var setEditRate=er[1];

  var showMonthEdit=useState(false);var sme=showMonthEdit[0];var setSme=showMonthEdit[1];

  // history indexed by month
  var history=acc.history||Array(12).fill(0);
  // Find latest non-zero balance from history
  var currentBal=acc.balance||0;
  for(var _ci=WINDOW_SIZE-1;_ci>=0;_ci--){if(history[_ci]>0){currentBal=history[_ci];break;}}
  var typeLabel=acc.type==='fondos'?'Fondos':acc.type==='remunerada'?'Remunerada':'Corriente';
  var typeColor=acc.type==='fondos'?'#FFD166':acc.type==='remunerada'?'#4FACFE':'#94A3B8';

  function saveBalance(mIdx){
    var n=parseFloat(val);if(isNaN(n))return;
    var newHistory=history.slice();newHistory[mIdx]=n;
    var newBal=newHistory[WINDOW_SIZE-1]||n;
    dispatch({type:'UPDATE_ACCOUNT',account:Object.assign({},acc,{balance:newBal,history:newHistory})});
    sb.from('account_history').upsert([{account_id:parseInt(acc.id)||acc.id,month:DB_MONTHS[mIdx],balance:n}],{onConflict:'account_id,month'}).then(function(r){if(r.error)logErr('history upsert error: '+JSON.stringify(r.error)+' id='+acc.id+' month='+DB_MONTHS[mIdx]);else logOk('history saved: '+DB_MONTHS[mIdx]+' = '+n);});
    setEditing(false); // keep grid open (setSme stays true)
  }
  function saveRate(){
    var n=parseFloat(rateVal);if(isNaN(n)||n<0)return;
    dispatch({type:'UPDATE_ACCOUNT',account:Object.assign({},acc,{interestRate:n,rateHistory:(acc.rateHistory||[]).concat([{date:new Date().toISOString().slice(0,10),rate:n}])})});
    sb.from('account_rates').upsert([{account_id:parseInt(acc.id)||acc.id,effective_from:DB_MONTHS[WINDOW_SIZE-1],rate:n}],{onConflict:'account_id,effective_from'}).then(function(r){if(r.error)logErr('rate upsert error: '+JSON.stringify(r.error));});
    setEditRate(false);

  var rateLabel=acc.type==='fondos'?'% rent.':'% TAE';

  return h('div',{style:{borderBottom:'1px solid rgba(255,255,255,0.05)',paddingBottom:10,marginBottom:4}},
    h('div',{style:{display:'flex',alignItems:'center',gap:11,paddingTop:9}},

      h('div',{style:{flex:1}},
        h('div',{style:{display:'flex',alignItems:'center',gap:6}},

          h('div',{style:{fontSize:9,background:typeColor+'22',color:typeColor,borderRadius:5,padding:'1px 5px',fontWeight:700}},typeLabel)
        ),
        acc.type!=='corriente'?(
          editRate?
            h('div',{style:{display:'flex',alignItems:'center',gap:4,marginTop:2}},
              h('input',{type:'number',value:rateVal,onChange:function(e){setRateVal(e.target.value);},onBlur:function(){saveRate();},onKeyDown:function(e){if(e.key==='Enter')saveRate();if(e.key==='Escape')setEditRate(false);},autoFocus:true,step:'0.01',style:{background:'rgba(255,255,255,0.08)',border:'1px solid '+typeColor+'66',borderRadius:6,color:typeColor,fontSize:11,width:52,padding:'2px 5px',outline:'none'}}),
              h('span',{style:{fontSize:11,color:'rgba(238,242,255,0.4)'}},rateLabel)
            ):
            h('div',{style:{fontSize:11,color:'rgba(238,242,255,0.38)',marginTop:2,cursor:'pointer'},onClick:function(){setEditRate(true);}},
              (acc.interestRate||0)+rateLabel+' ✏️'
            )
        ):h('div',{style:{fontSize:11,color:'rgba(238,242,255,0.35)',marginTop:2}},'Sin remuneración')
      ),
      h('div',{style:{textAlign:'right'}},
        h('div',{style:{fontSize:15,fontWeight:700,color:'#EEF2FF',cursor:'pointer'},onClick:function(){if(!sme){setEditing(true);setVal(String(currentBal));setEditMonthIdx(WINDOW_SIZE-1);}}},fmt(currentBal)),
        h('div',{style:{fontSize:10,color:'rgba(238,242,255,0.35)',marginTop:2,cursor:'pointer'},onClick:function(){setSme(!sme);setEditing(false);}},sme?'▲ cerrar':'✏️ por mes')
      )
    ),
    // Month-by-month balance editor
    sme?h('div',{style:{marginTop:10,background:'rgba(255,255,255,0.03)',borderRadius:10,padding:'10px'}},
      h('div',{style:{fontSize:10,color:'rgba(238,242,255,0.4)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}},'Saldo por mes'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}},
        DB_MONTHS.map(function(m,i){
          // Only show up to current month (WINDOW_SIZE-1), skip future
          if(i>WINDOW_SIZE-1)return null;
          var bal=history[i]||0;
          var isEditing=editing&&editMonthIdx===i;

          var showYear=i===0||(DB_MONTHS[i].slice(0,4)!==DB_MONTHS[i-1].slice(0,4));
          var cellLabel=MONTHS_SHORT[i]+(showYear?' \''+DB_MONTHS[i].slice(2,4):'');
          return h('div',{key:m,style:{background:'rgba(255,255,255,0.04)',borderRadius:8,padding:'6px',textAlign:'center',cursor:'pointer',border:isEditing?'1px solid '+typeColor:(i===WINDOW_SIZE-1?'1px solid rgba(255,255,255,0.1)':'1px solid transparent')},
            onClick:function(){if(!isEditing){setEditing(true);setEditMonthIdx(i);setVal(bal>0?String(bal):'');}}},
            h('div',{style:{fontSize:8,color:showYear?'rgba(238,242,255,0.6)':'rgba(238,242,255,0.35)',marginBottom:2,lineHeight:1.2}},
              MONTHS_SHORT[i]+(showYear?' \''+DB_MONTHS[i].slice(2,4):'')
            ),
            isEditing?
              h('input',{type:'number',value:val,onChange:function(e){setVal(e.target.value);},
                onBlur:function(){saveBalance(i);},
                onKeyDown:function(e){if(e.key==='Enter')saveBalance(i);if(e.key==='Escape')setEditing(false);},
                autoFocus:true,placeholder:'0',style:{background:'none',border:'none',color:typeColor,fontSize:12,fontWeight:700,width:'100%',outline:'none',textAlign:'center',padding:0}}):
              h('div',{style:{fontSize:12,fontWeight:700,color:bal>0?'#EEF2FF':'rgba(238,242,255,0.18)'}},bal>0?Math.round(bal)+'€':'—')
          );
        })
      )
    ):null
  );
}

// ─── SHARED EXPENSES TAB ──────────────────────────────────────────────────────
function calcShares(e){
  var s=e.split,t=e.amount,p,el;
  if(s.type==='fixed'){p=s.pablo||0;el=s.ella||0;}
  else{var pct=(s.pablo||50)/100;p=Math.round(t*pct*100)/100;el=Math.round((t-p)*100)/100;}
  return{pablo:p,ella:el};
}
function calcBalance(exps,reimbs,uid){
  var oth=uid==='pablo'?'ella':'pablo',bal=0;
  exps.filter(function(e){return !e.settled;}).forEach(function(e){
    var sh=calcShares(e);
    if(e.paidBy===uid)bal+=sh[oth];else bal-=sh[uid];
  });
  reimbs.filter(function(r){return !r.settled;}).forEach(function(r){
    if(r.to===uid)bal+=r.amount;if(r.from===uid)bal-=r.amount;
  });
  return bal;
}
function calcCatBD(exps,uid){
  var cats={};
  var oth=uid==='pablo'?'ella':'pablo';
  exps.forEach(function(e){
    var sh=calcShares(e),cat=e.category;
    if(!cats[cat])cats[cat]={paidByMe:0,paidByOther:0,myTotal:0,oweToOther:0,oweFromOther:0};
    if(e.paidBy===uid){
      cats[cat].paidByMe+=e.amount;
      cats[cat].oweFromOther+=sh[oth]; // lo que el otro me debe por esta categoría
    }else{
      cats[cat].paidByOther+=e.amount;
      cats[cat].oweToOther+=sh[uid]; // lo que yo le debo por esta categoría
    }
    cats[cat].myTotal+=sh[uid];
  });
  return cats;
}

// Evolución mes a mes del módulo Compartido: total, mi parte, pagado por cada uno.
function calcMonthlySeries(exps,uid){
  var months=Array.from(new Set(exps.map(function(e){return e.month;}))).sort();
  var byMonth={};
  months.forEach(function(m){byMonth[m]={total:0,mine:0,paidByMe:0,paidByOther:0};});
  exps.forEach(function(e){
    var sh=calcShares(e);
    var b=byMonth[e.month];
    b.total+=e.amount;
    b.mine+=sh[uid];
    if(e.paidBy===uid)b.paidByMe+=e.amount;else b.paidByOther+=e.amount;
  });
  return{months:months,byMonth:byMonth};
}

// Desglose por categoría agregado en un rango de meses (para la tarta con histórico completo).
function calcCatBDByMonths(exps,uid,monthsSet){
  var filtered=monthsSet?exps.filter(function(e){return monthsSet.indexOf(e.month)>=0;}):exps;
  return calcCatBD(filtered,uid);
}

function SharedTab(){
  var ctx=useApp();var state=ctx.state;var dispatch=ctx.dispatch;
  var PC='#C084FC';
  var cats=state.settings.expenseCategories||['Supermercado','Gasolina','Restaurantes','Casa','Otros'];

  var sa=useState(false);var showAdd=sa[0];var setShowAdd=sa[1];
  var sv=useState('pending');var view=sv[0];var setView=sv[1];
  var sm=useState(THIS_MONTH_S);var selMonth=sm[0];var setSelMonth=sm[1];
  var sr=useState(false);var showReimb=sr[0];var setShowReimb=sr[1];
  var ra=useState('');var reimbAmt=ra[0];var setReimbAmt=ra[1];
  var rn=useState('');var reimbNote=rn[0];var setReimbNote=rn[1];
  var ss=useState(false);var showSettled=ss[0];var setShowSettled=ss[1];
  var lm=useState('total');var lineMetric=lm[0];var setLineMetric=lm[1]; // 'total' | 'mine' | 'byPayer'
  var pm=useState('total');var pieMetric=pm[0];var setPieMetric=pm[1]; // 'total' | 'mine'
  var rf=useState(false);var refreshing=rf[0];var setRefreshing=rf[1];
  var rt=useState(null);var lastRefresh=rt[0];var setLastRefresh=rt[1];

  function doRefresh(){
    setRefreshing(true);
    fetchSharedData(function(ok){
      setRefreshing(false);
      if(ok)setLastRefresh(new Date());
    }).then(function(data){
      if(data)dispatch({type:'SET_SHARED_DATA',sharedExpenses:data.sharedExpenses,reimbursements:data.reimbursements});
    });
  }

  // Auto-refresh al entrar a la pestaña Compartido (este componente se monta cada vez que se abre)
  useEffect(function(){ doRefresh(); },[]);

  var months=Array.from(new Set(allExp.map(function(e){return e.month;}))).sort().reverse();
  if(months.indexOf(THIS_MONTH_S)<0)months.unshift(THIS_MONTH_S);

  var balance=calcBalance(allExp.filter(function(e){return !e.settled;}),reimbs.filter(function(r){return !r.settled;}),ME);
  var iOwe=balance<0;var balAmt=Math.abs(balance);

  var displayExp=view==='pending'
    ?allExp.filter(function(e){return !e.settled;})
    :allExp.filter(function(e){return e.month===selMonth&&(showSettled||!e.settled);});

  var bd=calcCatBD(displayExp,ME);
  var catEntries=Object.entries(bd).sort(function(a,b){return b[1].myTotal-a[1].myTotal;});
  var totMe=catEntries.reduce(function(s,e){return s+e[1].myTotal;},0);
  var totPaidMe=catEntries.reduce(function(s,e){return s+e[1].paidByMe;},0);
  var totPaidOth=catEntries.reduce(function(s,e){return s+e[1].paidByOther;},0);
  var totOweToOther=catEntries.reduce(function(s,e){return s+e[1].oweToOther;},0);
  var totOweFromOther=catEntries.reduce(function(s,e){return s+e[1].oweFromOther;},0);

  // ── Evolución mes a mes (siempre sobre el histórico completo, no solo pendiente/mes seleccionado) ──
  var monthly=calcMonthlySeries(allExp,ME);
  var evoMonths=monthly.months;
  var evoLabels=evoMonths.map(function(m){return new Date(m+'-01').toLocaleDateString('es-ES',{month:'short',year:'2-digit'});});
  var lineSeries=lineMetric==='byPayer'
    ?[
      {label:SHARED_USERS[ME].name,color:SHARED_USERS[ME].color,data:evoMonths.map(function(m){return monthly.byMonth[m].paidByMe;})},
      {label:PARTNER.name,color:PARTNER.color,data:evoMonths.map(function(m){return monthly.byMonth[m].paidByOther;})}
    ]
    :[{label:lineMetric==='mine'?'Mi parte':'Total compartido',color:'#4FACFE',
       data:evoMonths.map(function(m){return lineMetric==='mine'?monthly.byMonth[m].mine:monthly.byMonth[m].total;})}];

  // ── Tarta por categoría (histórico completo) ──
  var pieBD=calcCatBD(allExp,ME);
  var pieEntries=Object.entries(pieBD).map(function(e){
    return{cat:e[0],value:pieMetric==='mine'?e[1].myTotal:(e[1].paidByMe+e[1].paidByOther)};
  }).filter(function(e){return e.value>0;}).sort(function(a,b){return b.value-a.value;});
  var pieSegments=pieEntries.map(function(e,i){return{value:e.value,color:SHARED_CAT_COLORS[i%SHARED_CAT_COLORS.length]};});
  var pieLabels=pieEntries.map(function(e){return e.cat;});
  var pieTotal=pieEntries.reduce(function(s,e){return s+e.value;},0);

    var newReimb={

      amount:amt,date:new Date().toISOString().slice(0,10),

    dispatch({type:'ADD_REIMBURSEMENT',reimbursement:newReimb});
    sbShared.from('reimbursements').insert([{
      id:newReimb.id,"from":newReimb.from,"to":newReimb.to,amount:newReimb.amount,
      date:newReimb.date,month:newReimb.month,note:newReimb.note,settled:false
    }]).then(function(r){if(r.error)logErr('reimbursement save err: '+r.error.message);else logOk('reimbursement saved: '+newReimb.id);});
    setShowReimb(false);setReimbAmt('');setReimbNote('');

      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
        h('div',null,

          h('div',{style:{fontSize:36,fontWeight:800,color:iOwe?'#FF6B6B':'#3DD68C',letterSpacing:'-0.02em',lineHeight:1}},fmt(balAmt)),

  var entry = {t: new Date().toISOString().slice(11,19), level: level, msg: msg};
  _appLogs.unshift(entry);
  if(_appLogs.length > 50) _appLogs.pop();
  if(level==='error') console.error('[Finergy]', msg);
  else console.log('[Finergy]', msg);
}

// DB_MONTHS defined dynamically via buildMonthWindow() above

function buildStateFromDB(rows) {
  var expenses = {};
  var income = {};

  rows.forEach(function(row) {
    if (row.type === 'expense') {
      if (!expenses[row.category]) expenses[row.category] = Array(WINDOW_SIZE).fill(0);
    } else if (row.type === 'income') {
      if (!income[row.category]) income[row.category] = Array(WINDOW_SIZE).fill(0);
    }
  });

  rows.forEach(function(row) {
    var idx = DB_MONTHS.indexOf(row.month);
    if (idx === -1) return;
    if (row.type === 'expense' && expenses[row.category]) {
      expenses[row.category][idx] = parseFloat(row.amount) || 0;
    } else if (row.type === 'income' && income[row.category]) {
      income[row.category][idx] = parseFloat(row.amount) || 0;
    }
  });

  return { expenses: expenses, income: income };
}

function mapSharedExpenseRow(r) {
  return {id:r.id,paidBy:r.paid_by,date:r.date,category:r.category,description:r.description,
    amount:parseFloat(r.amount)||0,
    split:{type:r.split_type,pablo:parseFloat(r.split_pablo)||0,ella:parseFloat(r.split_ella)||0},
    settled:!!r.settled,month:r.month};
}
function mapReimbursementRow(r) {
  return {id:r.id,from:r.from,to:r.to,amount:parseFloat(r.amount)||0,date:r.date,note:r.note||'',month:r.month,settled:!!r.settled};
}
// Recarga shared_expenses + reimbursements desde sbShared. onDone(ok:boolean) opcional.
function fetchSharedData(onDone) {
  return Promise.all([
    sbShared.from('shared_expenses').select('*'),
    sbShared.from('reimbursements').select('*')
  ]).then(function(results){
    var seRes=results[0],reRes=results[1];
    if(seRes.error||reRes.error){
      logErr('refresh shared err: '+((seRes.error&&seRes.error.message)||(reRes.error&&reRes.error.message)));
      if(onDone)onDone(false);
      return null;
    }
    var data={
      sharedExpenses:(seRes.data||[]).map(mapSharedExpenseRow),
      reimbursements:(reRes.data||[]).map(mapReimbursementRow)
    };
    logOk('Compartido actualizado: '+data.sharedExpenses.length+' gastos, '+data.reimbursements.length+' reembolsos');
    if(onDone)onDone(true);
    return data;
  }).catch(function(e){
    logErr('refresh shared exception: '+e.message);
    if(onDone)onDone(false);
    return null;
  });
}

        var rates=(ratesRes.data||[]).filter(function(r){return r.account_id===a.id;}).sort(function(a,b){return b.effective_from.localeCompare(a.effective_from);});
        var latestRate=rates.length?parseFloat(rates[0].rate):0;
        var histArr=Array(WINDOW_SIZE).fill(0);
        hist.forEach(function(h){
          var idx=DB_MONTHS.indexOf(h.month);
          if(idx>=0)histArr[idx]=parseFloat(h.balance)||0;
        });
        var latestBal=histArr[WINDOW_SIZE-1]||histArr.reduce(function(max,v){return Math.max(max,v);},0)||0;
        return {id:String(a.id),name:a.name,type:a.type,balance:latestBal,interestRate:latestRate,

      });
      parsed.accounts=accs;

      var pb={tricounts:0,gastosEmpresa:0,efectivo:0};
      (pbRes.data||[]).forEach(function(r){if(pb.hasOwnProperty(r.key))pb[r.key]=parseFloat(r.value)||0;});
      parsed.pendingBalances=pb;
      logOk('Pending balances: '+JSON.stringify(pb));
      parsed.fundContributions=fcRes.data||[];
      logOk('Fund contributions: '+(fcRes.data||[]).length);
      // Shared expenses (Tricount adhoc) — siempre desde sbShared
      if(seRes.error){logErr('shared_expenses load err: '+seRes.error.message);parsed.sharedExpenses=[];}
      else{
        parsed.sharedExpenses=(seRes.data||[]).map(mapSharedExpenseRow);
        logOk('Shared expenses: '+parsed.sharedExpenses.length);
      }
      if(reRes.error){logErr('reimbursements load err: '+reRes.error.message);parsed.reimbursements=[];}
      else{
        parsed.reimbursements=(reRes.data||[]).map(mapReimbursementRow);
        logOk('Reimbursements: '+parsed.reimbursements.length);
      }
      setDbData(parsed);
      setLoading('done');
    }).catch(function(e) {
      console.error('Supabase error:', e);
      logErr('Load error: '+e.message);
      setError(e.message);
      setLoading('done');
    });
  }, []);

  if (loading === 'loading') {
    return h('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#040810',flexDirection:'column',gap:12}},
      h('img', {src:LOGO_B64, style:{width:80,height:80,marginBottom:4}}),
      h('div', {style:{fontSize:22,fontWeight:800,background:'linear-gradient(135deg,#3DD68C,#4FACFE)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:4}}, 'Finergy'),
      h('div', {style:{fontSize:12,color:'rgba(238,242,255,0.35)'}}, 'Cargando datos...')
    );
  }

  // Merge: datos DB encima del estado inicial (mock como fallback)
  var mergedState = dbData
    ? Object.assign({}, INITIAL_STATE, { expenses: dbData.expenses, income: dbData.income,
        settings: Object.assign({}, INITIAL_STATE.settings, {
          expenseCategories: Object.keys(dbData.expenses),
          incomeCategories: Object.keys(dbData.income)
        })
      })
    : INITIAL_STATE;

  // Mutar INITIAL_STATE ANTES de que App llame a useReducer
  if (dbData) {
    INITIAL_STATE.expenses = dbData.expenses;
    INITIAL_STATE.income = dbData.income;
    INITIAL_STATE.accounts = dbData.accounts||[];
    if(dbData.pendingBalances)INITIAL_STATE.pendingBalances=dbData.pendingBalances;
    if(dbData.fundContributions)INITIAL_STATE.fundContributions=dbData.fundContributions;
    INITIAL_STATE.sharedExpenses = dbData.sharedExpenses||[];
    INITIAL_STATE.reimbursements = dbData.reimbursements||[];
    INITIAL_STATE.settings.expenseCategories = Object.keys(dbData.expenses);
    INITIAL_STATE.settings.incomeCategories = Object.keys(dbData.income);
    window._finergyDbLoaded = true;
    logOk('Datos cargados: '+Object.keys(dbData.expenses).length+' cats gasto, '+Object.keys(dbData.income).length+' cats ingreso, '+((dbData.accounts||[]).length)+' cuentas');
  } else {
    window._finergyDbLoaded = false;
    logErr('Sin datos de Supabase');
  }

  return h(App, null);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(AppWithData, null));
</script>
</body>
</html>
